<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inpand Technologies — Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <style>
        /* =============================================
           CSS VARIABLES + RESET
           ============================================= */
        :root {
            --color-primary: #0029e0;
            --color-primary-dark: #0010c7;
            --color-accent: #ebeefc;
            --color-text: #101011;
            --color-text-muted: #646363;
            --color-white: #ffffff;
            --color-bg: #f5f7fa;
            --color-footer-bg: #020205;
            --color-footer-text: #f5f5f5;
            --color-footer-link: #b7b7c7;
            --color-green: #2ecc71;
            --font-heading: "Montserrat", sans-serif;
            --font-body: "Open Sans", sans-serif;
            --max-width-wide: 1180px;
            --gutter: clamp(1rem, 4vw, 2rem);
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.14);
            --transition: 0.3s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.75;
            color: var(--color-text);
            background: var(--color-white);
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            color: var(--color-primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ul {
            list-style: none;
        }

        .container {
            width: 100%;
            max-width: var(--max-width-wide);
            margin-inline: auto;
            padding-inline: var(--gutter);
        }

        /* =============================================
           PRELOADER
           ============================================= */
        .preloader {
            position: fixed;
            inset: 0;
            background: var(--color-white);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            animation: forceHidePreloader 0s ease 5s forwards;
        }

        @keyframes forceHidePreloader {
            to {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        }

        .preloader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .preloader-inner {
            display: flex;
            gap: 10px;
        }

        .bounce {
            width: 14px;
            height: 14px;
            background: var(--color-primary-dark);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .b1 { animation-delay: -0.32s; }
        .b2 { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* =============================================
           HEADER
           ============================================= */
        .site-header {
            position: relative;
            background: var(--color-white);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            transition: box-shadow var(--transition);
            z-index: 500;
        }

        /* ── UPDATED: removed max-width & margin-inline, added width: 100% ── */
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            width: 100%;
            padding: 0.75rem var(--gutter);
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo img {
            height: 92px;
            width: auto;
        }

        /* Nav toggle (hamburger) */
        .nav-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            z-index: 600;
        }

        .nav-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--color-text);
            border-radius: 2px;
            transition: transform var(--transition), opacity var(--transition);
        }

        .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .nav-toggle.open span:nth-child(2) { opacity: 0; }
        .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Desktop nav */
        .site-nav ul {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .site-nav a {
            display: block;
            padding: 0.75rem 0.9rem;
            font-family: var(--font-heading);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
            text-decoration: none;
            position: relative;
            transition: color var(--transition);
            white-space: nowrap;
        }

        .site-nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0.9rem;
            right: 0.9rem;
            height: 2px;
            background: var(--color-primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform var(--transition);
        }

        .site-nav a:hover,
        .site-nav a.active {
            color: var(--color-primary);
            text-decoration: none;
        }

        .site-nav a:hover::after,
        .site-nav a.active::after {
            transform: scaleX(1);
        }

        /* =============================================
           RESPONSIVE — HEADER
           ============================================= */
        @media (max-width: 640px) {
            .nav-toggle {
                display: flex;
            }

            .site-header {
                position: relative;
            }

            .site-nav {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--color-white);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease;
                z-index: 100;
            }

            .site-nav.open {
                max-height: 400px;
            }

            .site-nav ul {
                flex-direction: column;
                padding: 0.75rem 0;
            }

            .site-nav a {
                padding: 0.65rem 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- ======== PRELOADER ======== -->
    <div class="preloader" id="preloader">
        <div class="preloader-inner">
            <div class="bounce b1"></div>
            <div class="bounce b2"></div>
            <div class="bounce b3"></div>
        </div>
    </div>

    <!-- ======== HEADER / NAV ======== -->
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="home.html" class="logo">
                <img src="https://inpand.com/wp-content/uploads/2025/05/cropped-final-1-300x144.png"
                    alt="Inpand Technologies" />
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <nav class="site-nav" id="site-nav">
                <ul>
                    <li><a href="home.html" class="active">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Our Services</a></li>
                    <li><a href="tools.html">Our Tools</a></li>
                    <li><a href="blog.html">Our Blog</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <script>
        (function () {
            'use strict';

            /* ── PRELOADER ── */
            (function initPreloader() {
                var preloader = document.getElementById('preloader');
                if (!preloader) return;

                var hide = function () {
                    setTimeout(function () {
                        preloader.classList.add('hidden');
                    }, 400);
                };

                if (document.readyState === 'complete') {
                    hide();
                } else {
                    window.addEventListener('load', hide);
                }

                setTimeout(function () { preloader.classList.add('hidden'); }, 5000);
            })();

            /* ── MOBILE NAV TOGGLE ── */
            (function initNavToggle() {
                var toggle = document.getElementById('nav-toggle');
                var nav = document.getElementById('site-nav');
                if (!toggle || !nav) return;

                toggle.addEventListener('click', function () {
                    var isOpen = nav.classList.toggle('open');
                    toggle.classList.toggle('open', isOpen);
                    toggle.setAttribute('aria-expanded', String(isOpen));
                });

                nav.querySelectorAll('a').forEach(function (link) {
                    link.addEventListener('click', function () {
                        nav.classList.remove('open');
                        toggle.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                    });
                });

                document.addEventListener('click', function (e) {
                    if (!nav.contains(e.target) && !toggle.contains(e.target)) {
                        nav.classList.remove('open');
                        toggle.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                    }
                });
            })();

            /* ── STICKY HEADER SHADOW ── */
            (function initStickyHeader() {
                var header = document.getElementById('site-header');
                if (!header) return;

                window.addEventListener('scroll', function () {
                    header.style.boxShadow = window.scrollY > 10
                        ? '0 2px 20px rgba(0,0,0,0.12)'
                        : '0 2px 12px rgba(0,0,0,0.07)';
                }, { passive: true });
            })();

        })();
    </script>

</body>
</html>
