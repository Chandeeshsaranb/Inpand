<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Inpand Technologies</title>
    <meta name="description"
        content="Reach out to us for reliable technical support. Get in touch with Inpand Technologies." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="icon" href="../assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../Styles/contact.css" />
    <link rel="stylesheet" href="../Styles/contact-footer.css" />
</head>

<body>
    <div id="site-header-placeholder"></div>

    <main>
        <section class="contact-hero">
            <div class="contact-hero-shape" aria-hidden="true">
                <svg viewBox="0 0 1000 100" preserveAspectRatio="none">
                    <path d="M500,97C126.7,96.3,0.8,19.8,0,0v100l1000,0V1C1000,19.4,873.3,97.8,500,97z"></path>
                </svg>
            </div>

            <div class="container contact-hero-inner">
                <h1>Contact</h1>
                <p>Reach out to us for reliable technical support.</p>
                <a class="btn btn-primary" href="./home.html">Let's Work Together</a>
            </div>
        </section>

        <section class="contact-section section-heading">
            <div class="container narrow">
                <h2>Get in touch</h2>
            </div>
        </section>

        <section class="contact-section">
            <div class="container contact-grid">
                <div class="contact-info">
                    <article class="info-card">
                        <div class="info-icon">
                            <svg viewBox="0 0 384 512" aria-hidden="true">
                                <path
                                    d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0zM192 272c44.183 0 80-35.817 80-80s-35.817-80-80-80-80 35.817-80 80 35.817 80 80 80z">
                                </path>
                            </svg>
                        </div>
                        <div class="info-text">
                            <h3>Address</h3>
                            <p>MRC Complex, Gujiliamparai, Tamil Nadu 624703</p>
                        </div>
                    </article>

                    <article class="info-card">
                        <div class="info-icon">
                            <svg viewBox="0 0 512 512" aria-hidden="true">
                                <path
                                    d="M464 64H48C21.49 64 0 85.49 0 112v288c0 26.51 21.49 48 48 48h416c26.51 0 48-21.49 48-48V112c0-26.51-21.49-48-48-48zm0 48v40.805c-22.422 18.259-58.168 46.651-134.587 106.49-16.841 13.247-50.201 45.072-73.413 44.701-23.208.375-56.579-31.459-73.413-44.701C106.18 199.465 70.425 171.067 48 152.805V112h416zM48 400V214.398c22.914 18.251 55.409 43.862 104.938 82.646 21.857 17.205 60.134 55.186 103.062 54.955 42.717.231 80.509-37.199 103.053-54.947 49.528-38.783 82.032-64.401 104.947-82.653V400H48z">
                                </path>
                            </svg>
                        </div>
                        <div class="info-text">
                            <h3>Email</h3>
                            <p><a href="mailto:info@inpand.com">info@inpand.com</a></p>
                        </div>
                    </article>

                    <article class="info-card">
                        <div class="info-icon">
                            <svg viewBox="0 0 512 512" aria-hidden="true">
                                <path
                                    d="M497.39 361.8l-112-48a24 24 0 0 0-28 6.9l-49.6 60.6A370.66 370.66 0 0 1 130.6 204.11l60.6-49.6a23.94 23.94 0 0 0 6.9-28l-48-112A24.16 24.16 0 0 0 122.6.61l-104 24A24 24 0 0 0 0 48c0 256.5 207.9 464 464 464a24 24 0 0 0 23.4-18.6l24-104a24.29 24.29 0 0 0-14.01-27.6z">
                                </path>
                            </svg>
                        </div>
                        <div class="info-text">
                            <h3>Phone</h3>
                            <p><a href="tel:+916382016500">63820 16500</a> / <a href="tel:+919080394828">9080394828</a>
                            </p>
                        </div>
                    </article>
                </div>

                <div class="contact-form-wrap">
                    <form class="contact-form" id="contactForm" novalidate>
                        <div class="form-row">
                            <label class="sr-only" for="name">Your Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" required />
                            <small class="error-text"></small>
                        </div>

                        <div class="form-row">
                            <label class="sr-only" for="email">Your Email</label>
                            <input type="email" id="email" name="email" placeholder="Your Email" required />
                            <small class="error-text"></small>
                        </div>

                        <div class="form-row honeypot-field" aria-hidden="true">
                            <label for="website">Name Email Paragraph</label>
                            <input type="text" id="website" name="website" tabindex="-1" autocomplete="off" />
                        </div>

                        <div class="form-row">
                            <label class="sr-only" for="phone">Your Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="Your Number" required />
                            <small class="error-text"></small>
                        </div>

                        <div class="form-row">
                            <label class="sr-only" for="message">Your Message</label>
                            <textarea id="message" name="message" placeholder="Your Message" rows="6"></textarea>
                            <small class="error-text"></small>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </div>

                        <p class="form-status" id="formStatus" aria-live="polite"></p>
                    </form>
                </div>
            </div>
        </section>

        <section class="contact-section map-section">
            <div class="map-card">
                <iframe loading="lazy"
                    src="https://maps.google.com/maps?q=MRC%20complex%20M4J7%2B78R%2C%20Gujiliamparai%2C%20Tamil%20Nadu%20624703&t=m&z=12&output=embed&iwloc=near"
                    title="MRC Complex Map" aria-label="MRC Complex Map"></iframe>
            </div>
        </section>
    </main>

    <div id="site-footer-placeholder"></div>

    <script src="../common/common.js"></script>
    <script src="../Script/contact.js"></script>
</body>

</html>
